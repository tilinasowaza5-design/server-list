name: Probe and publish

on:
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches: [master, main]
  workflow_dispatch:

# Serialize runs; never cancel an in-flight probe (the last writer wins).
concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    # slim has everything we need and more, and it's super fast to setup
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Download latest xash3d-query
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .xash3d-master
          cd .xash3d-master
          gh release download continuous \
            --repo FWGS/xash3d-master \
            --pattern '*x86_64-unknown-linux-gnu*'
          tar --use-compress-program=unzstd -xf xash3d-master-*.tar.zst
          chmod +x xash3d-query
          ./xash3d-query --version

      - name: Seed previous probe state
        run: |
          mkdir -p output
          # fall back to an empty state if broken
          curl -fsSL --retry 3 -o output/state.json \
            "https://${GITHUB_REPOSITORY_OWNER,,}.github.io/${GITHUB_REPOSITORY##*/}/state.json" \
            || echo '{}' > output/state.json

      - name: Probe servers
        run: |
          set -o pipefail
          ./scripts/probe.py \
            --query ./.xash3d-master/xash3d-query \
            --sources ./servers \
            --output ./output \
            --tries 4 \
            --timeout 2 \
            --grace-hours 48 \
            2>&1 | tee ./output/probe.log

      - name: Add stub html
        run: |
          touch index.html
          touch .nojekyll # disable jekyll

      - name: Force-push to gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd output
          # single commit gh-pages to not bloat the repo
          git init -q -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "publish ${{ github.run_id }} (${GITHUB_SHA:0:7})"
          git push -q --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
